spring.application.name=project-pulse

server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/project_pulse
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# App base URL (used for shareable invite links)
app.base-url=${APP_BASE_URL:http://localhost:5173}

# Seed test data on startup (runs after JPA creates tables)
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:test-data.sql
spring.jpa.defer-datasource-initialization=true
