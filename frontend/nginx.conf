server {
    listen 80;

    # Serve the Vue SPA — unknown paths fall back to index.html for client-side routing
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container
    location /api/v1/ {
        proxy_pass https://backend.jollystone-f0de3b36.eastus.azurecontainerapps.io/api/v1/;
        proxy_ssl_server_name on;
        proxy_set_header Host backend.jollystone-f0de3b36.eastus.azurecontainerapps.io;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
